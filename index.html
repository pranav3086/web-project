<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-CITI Store</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
    header { background-color: #001f3f; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 24px; font-weight: bold; margin: 0; }
    .search-input { padding: 8px; width: 300px; border-radius: 4px; border: 1px solid #ccc; }
    .btn { background-color: white; color: #001f3f; border: 1px solid #001f3f; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; }
    .btn:hover { background-color: #e2e2e2; }
    .btn-primary { background-color: #001f3f; color: white; border: none; }
    .btn-primary:hover { background-color: #001122; }
    nav { background-color: #ffffff; padding: 10px 30px; border-bottom: 2px solid #ddd; display: flex; gap: 15px; flex-wrap: wrap; }
    nav button { background: none; border: none; font-size: 16px; cursor: pointer; color: #555; }
    nav button.active { color: #001f3f; font-weight: bold; text-decoration: underline; }
    .banner { background-color: #e9ecef; text-align: center; padding: 40px 20px; border-bottom: 1px solid #ddd; }
    .container { padding: 30px; }
    .product-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    .card { background: white; border: 1px solid #ddd; border-radius: 5px; padding: 15px; width: calc(33.333% - 20px); box-sizing: border-box; box-shadow: 0 2px 5px rgba(0,0,0,0.05); text-align: center; }
    .card img { width: 100%;  height: 180px;  object-fit: contain;  padding: 10px;  box-sizing: border-box;  background-color: #fff;  margin-bottom: 10px; }
    .card h3 { margin: 10px 0 5px; font-size: 18px; }
    .card p { font-size: 14px; color: #666; height: 40px; overflow: hidden; }
    .price { font-size: 20px; font-weight: bold; color: #d9534f; margin: 10px 0; }
    .cart-sidebar { position: fixed; right: -350px; top: 0; width: 300px; height: 100%; background: white; box-shadow: -2px 0 5px rgba(0,0,0,0.2); transition: right 0.3s; padding: 20px; display: flex; flex-direction: column; }
    .cart-sidebar.open { right: 0; }
    .cart-header { display: flex; justify-content: space-between; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
    .cart-item { display: flex; justify-content: space-between; margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
    .cart-total { margin-top: auto; font-size: 18px; font-weight: bold; padding-top: 15px; border-top: 2px solid #eee; margin-bottom: 15px;}
    @media (max-width: 900px) { .card { width: calc(50% - 20px); } }
    @media (max-width: 600px) { .card { width: 100%; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="App.jsx"></script>
</body>
</html>
